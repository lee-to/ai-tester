name: Feature request
description: Suggest a new capability or an improvement to an existing one.
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. A bit of context up front makes it much easier to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is currently painful or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the ideal API / UX look like? A YAML example, CLI invocation, or code sketch is gold.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other approaches you rejected and why.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art in other tools, related issues, etc.
