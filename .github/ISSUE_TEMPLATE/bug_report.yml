name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce the issue quickly.

        For **security vulnerabilities**, do NOT file a public issue — follow the [Security Policy](https://github.com/lee-to/ai-tester/blob/main/SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: ai-tester version
      description: Output of `ai-tester --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "macOS 14.5 (arm64)"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Which runtime adapter were you using?
      options:
        - claude
        - codex
        - other / not applicable
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include the full CLI output, error messages, and a stack trace if available.
      render: shell
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A scenario YAML + commands that reproduce the issue. The smaller, the better.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — recent changes, related issues, screenshots.
